<!-- JAVA: -->

<script>
// Variables
const moneyLabel = document.getElementById('moneyText');
const hungerLabel = document.getElementById('hungerText'); 
const foodLevelLabel = document.getElementById('foodLevelText');
const upgradeButton = document.getElementById('upgradeButton');

let hunger = 0;
let money = 0;  
let foodLevel = 0;
let foodLevelCost = 50;

// Change the text of hungerLabel and moneyLabel
function updateText() {
  hungerLabel.textContent = "🍔 Stamina: " + hunger;
  moneyLabel.textContent = "💵 Money: " + money;
  foodLevelLabel.textContent = "📉 Food Level: " + foodLevel;
  upgradeButton.textContent = "⬆️ Upgrade Food - $" + foodLevelCost;
}
  
// Change the value of the hunger
function feed() {
	hunger += 1 + foodLevel;
	updateText()
}
  
function upgrade() {
  if (money >= foodLevelCost) {
    money -= foodLevelCost
    foodLevelCost = foodLevelCost * 2
		foodLevel = foodLevel + 1
    updateText()
  }
}


// Looping function
function loopWithDelay() {
	let counter = 0;

	function iteration() {

		// Continue looping if the condition is met
		if (counter < counter + 1) {
			setTimeout(iteration, 1500); // Delay of 1 second
      money += Math.round(hunger / 10);
      document.getElementById('gainMoney').play();
      updateText()
      
      if (hunger > 0) {
        hunger -= 1 * (foodLevel + 1)
      }
		}
	}

	iteration(); // Start the loop
}

updateText();
loopWithDelay();

</script>
