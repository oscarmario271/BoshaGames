      width="300"

    <button id="feedBtn" onclick="feedFunction()">😋 Feed Pet 😋</button>
    <button id="exerciseBtn" onclick="exerciseFunction()">💪🏽 Exercise Pet 💪🏽</button>
    
    <p id="hunger"> 🍔 Hunger: </p>
    <p id="money"> 💵 Money: </p>

<script type="module">
  
// Oscar, if you see this that means im recoding the entire thing myself because this is broken. | UPDATE - 18:03 - Recoding done, check BoshaChat for more information. | Okay, I fixed the function that doesn't do anything. | Go on BoshaChat, I made a new page. Please go to https://syncfiddle.net/fiddle/-OpnBsUv5vwOfkvPLuv_ to enter it

const moneyLabel = document.getElementById('money');
const hungerLabel = document.getElementById('hunger');
const statusLabel = document.getElementById('status');
 
let hunger = 0;
let money = 50;

window.feedFunction = async function() {
  if (hunger > 0 && money >= 5) {
    hunger--;
    for (let i = 0; i < 2; i++) {
      money--;
    }
  } else {
    alert("Not enough hunger or money!");
  }
}
  
window.exerciseFunction = async function() {
  if (hunger > 5) {
    alert("Too hungry!");
    return;
  } else {
    for (let i = 0; i < 2; i++) {
      hunger++;
    }
    for (let i = 0; i < 5; i++) {
      money++
    }
  }
}
  
setInterval(() => {
  if (hunger < 10) {
    for (let i = 0; i < 2; i++) {
      hunger++;
    }
    for (let i = 0; i < 10; i++) {
      money++
    }
  } else {
    alert("Your pet died.");
  }
}, 10000);
  
setInterval(() => {
  hungerLabel.textContent = "🍔 Hunger: " + hunger;
  moneyLabel.textContent = "💵 Money: " + money;
}, 100);
</script>
