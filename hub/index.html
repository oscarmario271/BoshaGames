<!DOCTYPE html>
<html>
  <head>
    <title>BoshaGames Hub</title>
    <link rel="icon" type="image/png" href="res/BoshaGames.png">
    <style>
      h2 {
        font-family: "Helvetica Neue", Helvetica, sans-serif;
        color: #00a0ff;
        text-shadow: 2px 3px 1px #ac8830;
        font-size: 40px;
      }
      body {
        background: #ff9000;
      }
      p.main {
        font-family: "Helvetica Neue", Helvetica, sans-serif;
        color: #000000;
        text-shadow: 2px 2px 1px #ac8830;
        font-size: 30px;
      }
      button.main {
        font-size: 30px;
      }
      button {
        font-family: "Helvetica Neue", Helvetica, sans-serif;
        background: linear-gradient(#ffffff, #282727F);
        padding: 10px;
        border: solid;
        border-radius: 10px;
      }
      #authBox {
        text-align: center;
      }
      #loginErr {
        color: red;
      }
    </style>
  </head>
  <body>
    <div id="authBox">
    <h2>Login / Signup</h2>
    <input id="username" placeholder="Username"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button onclick="login()">Login</button><button onclick="signup()">Signup</button>
    <p id="loginErr"></p>
    </div>
    <div id="hub" style="display:none; width:100%;">
    <h2>BoshaGames</h2>
    <hr />
    <p class="main">Games:</p>
    <button class="main" onclick="petsim()">Pet Simulator</button>
    <button class="main" onclick="BeatUpAZombie()">Beat up a Zombie</button>
    <button class="main" onclick="boshapetsim()">Bosha Pet Simulator</button>
    </div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
  
  const firebaseConfig = {
    apiKey: "AIzaSyBLKhmEMHtArdFhcHAKceCPGtY0DT__ulY",
    authDomain: "boshagames-eeabe.firebaseapp.com",
    projectId: "boshagames-eeabe",
    storageBucket: "boshagames-eeabe.firebasestorage.app",
    messagingSenderId: "928025311830",
    appId: "1:928025311830:web:868df1d3ca80f8a39059f7"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const username = document.getElementById("username");
  const password = document.getElementById("password");
  const loginErr = document.getElementById("loginErr");
  const authBox = document.getElementById("authBox");
  const hubDiv = document.getElementById("hub");

  window.login = function () {
    console.log(username.value + "@boshagames.co.uk");
    signInWithEmailAndPassword(auth, username.value + "@boshagames.co.uk", password.value).catch(err => loginErr.innerText = err.message);
  }
  window.signup = function () {
    console.log(username.value + "@boshagames.co.uk");
    createUserWithEmailAndPassword(auth, username.value + "@boshagames.co.uk", password.value).catch(err => loginErr.innerText = err.message);
  }
  onAuthStateChanged(auth, async user => {
    if (user) {
      authBox.style.display = "none";
      hubDiv.style.display = "flex";
    } else {
      authBox.style.display = "flex";
      hubDiv.style.display = "none";
    }
  });
    
  window.petsim = async function () {
    window.location.href = "/BoshaGames/PetSimulator/";
  };
  window.boshapetsim = async function () {
    window.location.href = "/BoshaGames/BoshaPetSim/";
  };
  window.BeatUpAZombie = async function () {
    window.location.href = "/BoshaGames/BeatUpAZombie/";
  };
  </script>
  </body>
</html>
